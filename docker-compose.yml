version: "3.8"

services:

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - backend-network

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend-network

  vote:
    build: ./vote
    ports:
      - "5000:80"
    depends_on:
      - redis
    networks:
      - frontend-network
      - backend-network


  result:
    build: ./result
    ports:
      - "5001:4000"
    depends_on:
      - db
    networks:
      - backend-network
      - frontend-network

  worker:
    build: ./worker
    depends_on:
      - redis
      - db
    networks:
      - backend-network

volumes:
  db-data:
networks:
  frontend-network:
  backend-network: